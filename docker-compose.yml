version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aeroclube_db
    environment:
      POSTGRES_USER: aeroclube
      POSTGRES_PASSWORD: aeroclube_pass
      POSTGRES_DB: aeroclube_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aeroclube -d aeroclube_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
